<!DOCTYPE html>
<html>
<head>
<title>My Shop</title>

<style>

body{
font-family:Arial;
  min-height:100vh;
background-image: url("4bba557fcfbadbd61865c70e93bea41f.jpg");
background-size: cover;
background-position: center;
background-repeat: no-repeat;
text-align:center;
margin:0;
}

header{
background:black;
color:white;
padding:20px;
font-size:30px;
}

.products{
display:flex;
justify-content:center;
flex-wrap:wrap;
margin-top:20px;
}

.product{
background:white;
margin:20px;
padding:20px;
width:200px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

button{
background:#22c55e;
border:none;
padding:10px 15px;
color:white;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#16a34a;
}

}
</style>
</head>

<body>

<header>🛒 My Online Shop</header>

<div class="products">

<div class="product">
<h3>Shoes</h3>
<p>Price: $40</p>
<button>Buy</button>
</div>

<div class="product">
<h3>T-shirt</h3>
<p>Price: $20</p>
<button>Buy</button>
</div>

<div class="product">
<h3>Cap</h3>
<p>Price: $10</p>
<button>Buy</button>
</div>
<div class="product">
<h3>Free mama</h3>
<p>Price: $5</p>
<button>Buy</button>
</div>
</div>

</body>
</html>
